spring.application.name=management

# ===============================
# MYSQL DATABASE CONFIGURATION
# ===============================

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/librarySystem

#spring.datasource.username=root
#spring.datasource.password=Mayuri@123

spring.datasource.username=${DB UERNAME:}

spring.datasource.password=${DB PASSWORD:}


# ===============================
# JDBC DRIVER
# ===============================

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================

# Automatically create/update tables
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console
spring.jpa.show-sql=true

# Format SQL queries
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# AWS CONFIGURATION
# ===============================

aws.accessKey=YOUR_ACCESS_KEY
aws.secretKey=YOUR_SECRET_KEY
aws.region=ap-south-1
aws.bucketName=library-management-profile

# ===============================
# SERVER PORT (OPTIONAL)
# ===============================

server.port=8080